<div class="user-edit">
  <div class="page-header">
    <a routerLink="/admin/users" class="back-link">← Retour aux utilisateurs</a>
    <h2>Modifier l'utilisateur</h2>
  </div>

  @if (error()) {
    <div class="error-message">
      <span>{{ error() }}</span>
      <button (click)="loadUser(user()!.id)">Réessayer</button>
    </div>
  }

  @if (isLoading()) {
    <div class="loading">
      <div class="spinner"></div>
      <span>Chargement...</span>
    </div>
  } @else if (user()) {
    <div class="form-card">
      <form (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="full_name">Nom complet *</label>
          <input
            type="text"
            id="full_name"
            [(ngModel)]="formData.full_name"
            name="full_name"
            required
          />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="country_code">Indicatif</label>
            <input
              type="text"
              id="country_code"
              [(ngModel)]="formData.country_code"
              name="country_code"
              placeholder="+243"
            />
          </div>

          <div class="form-group flex-2">
            <label for="phone">Téléphone *</label>
            <input
              type="text"
              id="phone"
              [(ngModel)]="formData.phone"
              name="phone"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            [(ngModel)]="formData.email"
            name="email"
          />
        </div>

        <div class="form-group">
          <label for="profession">Profession</label>
          <input
            type="text"
            id="profession"
            [(ngModel)]="formData.profession"
            name="profession"
          />
        </div>

        <div class="form-group">
          <label for="neighborhood">Quartier</label>
          <input
            type="text"
            id="neighborhood"
            [(ngModel)]="formData.neighborhood"
            name="neighborhood"
          />
        </div>

        <div class="form-group">
          <label for="role">Rôle *</label>
          <select id="role" [(ngModel)]="formData.role" name="role" required>
            <option value="user">Utilisateur</option>
            <option value="admin">Administrateur</option>
          </select>
        </div>

        <div class="form-actions">
          <a routerLink="/admin/users" class="btn-cancel">Annuler</a>
          <button type="submit" class="btn-submit" [disabled]="isSaving()">
            {{ isSaving() ? 'Enregistrement...' : 'Enregistrer' }}
          </button>
        </div>
      </form>
    </div>
  }
</div>
